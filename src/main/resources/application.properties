spring.application.name=api

#Puerto del servicio
server.port=8080

#Configuracion de Base de Datos H2 en memoria
spring.datasource.url=jdbc:h2:mem:clientedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username: user
spring.datasource.password: password

#Configuracion de JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql= true

#Configuracion de Spring Boot Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true

#Configuracion de Springdoc OpenAPI para documentación de API
springdoc.api-docs.path= /api-docs
springdoc.swagger-ui.path= /swagger-ui.html